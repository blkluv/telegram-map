<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Telegram Nearby Map</title>

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.bundle.min.js"></script>

  <!-- OpenLayers CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@6.9.0/ol.css">

  <!-- Geocoder CSS -->
  <link rel="stylesheet" href="https://unpkg.com/ol-geocoder/dist/ol-geocoder.min.css">

  <!-- Popup CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol-popup@4.0.0/src/ol-popup.css">

  <!-- Local styles -->
  <link rel="stylesheet" href="./style.css">

</head>

<body>

  <!-- Loading Overlay -->
  <div id="loadOverlay">
    <div id="loadOverlayTimer"></div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">

    <div id="settings">

      <input
        type="button"
        id="btn_start"
        value="Start Search"
        class="btn btn-primary"
      />

      <input
        type="button"
        id="btn_stop"
        value="Stop Search"
        class="btn btn-warning"
      />

      <input
        type="button"
        id="btn_reset"
        value="Reset Map"
        class="btn btn-danger"
      />

      <div class="input-group input-group-sm mb-3 settings-distance">

        <div class="input-group-prepend">
          <span class="input-group-text">
            Search distance (meters)
          </span>
        </div>

        <input
          type="text"
          id="txt_gap"
          value="500"
          class="form-control"
        />

      </div>

    </div>

    <!-- User List -->
    <div id="chatListContainer" class="container">

      <div class="row">

        <div id="chatList" class="col-sm-12"></div>

      </div>

    </div>

  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Map Extensions -->
  <div id="mapExtensions" style="display:none">

    <div id="marker"></div>

    <div id="popup"></div>

  </div>

  <!-- App Script -->
  <script type="module" src="./web.js"></script>

</body>

</html>
